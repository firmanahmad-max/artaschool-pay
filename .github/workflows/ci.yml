name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  # Jaring pengaman yang TIDAK butuh database — wajib jalan tiap perubahan,
  # supaya perlindungan yang sudah dibangun tidak diam-diam rusak.
  jaring-pengaman:
    name: Privasi (UU PDP) & aksesibilitas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Penyaring data pribadi laporan error
        run: npm run test:scrub
      - name: Kontras WCAG 2.1 AA (kedua tema)
        run: npm run audit:kontras

  database:
    name: Validasi skema PostgreSQL 16
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artaschool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Stub skema auth Supabase
        run: psql -h localhost -U postgres -d artaschool -v ON_ERROR_STOP=1 -f supabase/ci/auth_stub.sql
      - name: Jalankan migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "== $f"
            psql -h localhost -U postgres -d artaschool -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Jalankan seed
        run: psql -h localhost -U postgres -d artaschool -v ON_ERROR_STOP=1 -f supabase/seed.sql
      - name: Tes logika keuangan (RPC, trigger, batas peran)
        run: psql -h localhost -U postgres -d artaschool -v ON_ERROR_STOP=1 -f supabase/tests/rpc_test.sql
      - name: Pastikan proteksi kritis terpasang
        run: |
          psql -h localhost -U postgres -d artaschool -v ON_ERROR_STOP=1 -c "
            do \$\$
            begin
              -- payments tidak boleh punya policy UPDATE bagi siapa pun
              if exists (select 1 from pg_policies
                         where tablename='payments' and cmd in ('UPDATE','ALL')) then
                raise exception 'payments punya policy UPDATE — status hanya boleh lewat RPC';
              end if;
              -- audit_logs wajib append-only
              if not exists (select 1 from pg_trigger
                             where tgname='audit_logs_immutable') then
                raise exception 'trigger append-only audit_logs hilang';
              end if;
              -- RLS wajib aktif di tabel sensitif
              if exists (select 1 from pg_class c join pg_namespace n on n.oid=c.relnamespace
                         where n.nspname='public' and not c.relrowsecurity
                           and c.relname in ('payments','bills','students','guardians',
                                             'audit_logs','notification_jobs','rate_limits')) then
                raise exception 'ada tabel sensitif tanpa RLS';
              end if;
            end \$\$;"
